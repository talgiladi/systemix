services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: systemix-web
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-Systemix}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
      REQUEST_LOG_ENABLED: ${REQUEST_LOG_ENABLED:-true}
      CONTACT_RATE_LIMIT: ${CONTACT_RATE_LIMIT:-5}
      CONTACT_RATE_WINDOW_SECONDS: ${CONTACT_RATE_WINDOW_SECONDS:-600}
    restart: unless-stopped
